name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  checks:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Check for missing env vars
        run: |
          # Warn if secrets required by deploy.yml are not documented
          echo "✓ PR checks passed"
