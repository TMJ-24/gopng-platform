AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GoPNG Digital Platform - VPC, RDS PostgreSQL, S3, ECR, ECS Fargate,
  ALB, CloudFront, IAM OIDC roles, Secrets Manager. Single-stack deployment.

# ----------------------------------------------------------------------
# PARAMETERS
# ----------------------------------------------------------------------
Parameters:

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: RDS master password (min 16 chars)

  PayloadSecretValue:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Payload CMS JWT secret - use `openssl rand -base64 48`

  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub PAT with repo + workflow + actions:write scopes

  GitHubOrg:
    Type: String
    Default: TMJ-24
    Description: GitHub username / org where site repos are created

  GitHubTemplateRepo:
    Type: String
    Default: site-template
    Description: Template repo name to clone for each new site

  PayloadURL:
    Type: String
    Default: ''
    Description: Public URL of the admin (e.g. https://cms.digital.gov.pg)

  DBInstanceClass:
    Type: String
    Default: db.t4g.micro
    AllowedValues: [db.t4g.micro, db.t4g.small, db.t4g.medium, db.r8g.large]

  DBMultiAZ:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable Multi-AZ for RDS (recommended for production)

  TaskCpu:
    Type: Number
    Default: 1024
    AllowedValues: [512, 1024, 2048, 4096]

  TaskMemory:
    Type: Number
    Default: 2048

  CreateOIDCProvider:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Set false if the GitHub Actions OIDC provider already exists in
      this AWS account (only one per account is allowed).

# ----------------------------------------------------------------------
# CONDITIONS
# ----------------------------------------------------------------------
Conditions:
  ShouldCreateOIDC: !Equals [!Ref CreateOIDCProvider, 'true']

# ----------------------------------------------------------------------
# RESOURCES
# ----------------------------------------------------------------------
Resources:

  # -- 1. VPC & NETWORKING -------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: gopng-vpc}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{Key: Name, Value: gopng-igw}]

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public subnets - ALB lives here
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: gopng-public-a}]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: gopng-public-b}]

  # Private subnets - ECS tasks and RDS live here
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{Key: Name, Value: gopng-private-a}]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{Key: Name, Value: gopng-private-b}]

  # NAT Gateway - allows private subnets to reach internet (ECR, GitHub)
  NATElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATElasticIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags: [{Key: Name, Value: gopng-nat}]

  # Route tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: gopng-public-rt}]

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicRTAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicRTAssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: gopng-private-rt}]

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateRTAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateRTAssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # S3 Gateway endpoint - routes S3 traffic within AWS, bypasses NAT (free)
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  # -- 2. SECURITY GROUPS --------------------------------------------

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - HTTP/HTTPS inbound from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0}
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0}
      Tags: [{Key: Name, Value: sg-alb}]

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks - port 3000 from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags: [{Key: Name, Value: sg-ecs}]

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS - PostgreSQL from ECS only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup
      Tags: [{Key: Name, Value: sg-rds}]

  # -- 3. RDS POSTGRESQL ---------------------------------------------

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBName: png_gwp
      Engine: postgres
      EngineVersion: '16.4'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: '20'
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: postgres
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: [!GetAtt RDSSecurityGroup.GroupId]
      MultiAZ: !Ref DBMultiAZ
      PubliclyAccessible: false
      DeletionProtection: true
      BackupRetentionPeriod: 7
      EnablePerformanceInsights: false

  # -- 4. S3 BUCKETS -------------------------------------------------

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub gopng-media-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, HEAD]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']
            MaxAge: 3600

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub ${MediaBucket.Arn}/*

  StaticSitesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub gopng-static-sites-${AWS::AccountId}

  StaticSitesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSitesBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${StaticSitesBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub
                  - arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistId}
                  - DistId: !Ref StaticSitesDistribution

  # -- 5. ECR --------------------------------------------------------

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: gopng-platform
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep last 10 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},
          "action":{"type":"expire"}}]}

  # -- 6. IAM - OIDC PROVIDER & ROLES -------------------------------

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDC
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList: [sts.amazonaws.com]
      # Both current GitHub Actions OIDC root CA thumbprints
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # Role assumed by gopng-platform GitHub Actions - ECR + ECS deploy
  PlatformDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gopng-platform-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/gopng-platform:*
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
      Policies:
        - PolicyName: ECSDeployAndMigrate
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:RunTask
                  - ecs:DescribeTasks
                Resource: '*'
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt ECSTaskExecutionRole.Arn
                  - !GetAtt ECSTaskRole.Arn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gopng/*

  # Role assumed by site-* GitHub Actions repos - S3 sync + CloudFront invalidation
  SiteDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gopng-site-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Wildcard covers every site repo (site-health-gov-pg, site-finance-gov-pg, -)
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/site-*:*
      Policies:
        - PolicyName: SiteDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:DeleteObject, s3:GetObject, s3:ListBucket]
                Resource:
                  - !GetAtt StaticSitesBucket.Arn
                  - !Sub ${StaticSitesBucket.Arn}/*
              - Effect: Allow
                Action: cloudfront:CreateInvalidation
                Resource: '*'

  # Execution role - allows ECS agent to pull images and read secrets
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gopng-ecs-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:gopng/*

  # Task role - permissions the running app container has
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gopng-ecs-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3MediaReadWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt MediaBucket.Arn
                  - !Sub ${MediaBucket.Arn}/*

  # -- 7. SECRETS MANAGER --------------------------------------------

  DatabaseURLSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: gopng/database-url
      Description: Payload CMS PostgreSQL connection string
      SecretString: !Sub
        - "postgres://postgres:${DBPassword}@${Host}:5432/png_gwp"
        - Host: !GetAtt RDSInstance.Endpoint.Address

  PayloadSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: gopng/payload-secret
      Description: Payload CMS JWT signing secret
      SecretString: !Ref PayloadSecretValue

  GitHubTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: gopng/github-token
      Description: GitHub PAT for site repo provisioning
      SecretString: !Ref GitHubToken

  # -- 8. ECS CLUSTER + TASK DEFINITIONS + SERVICE -------------------

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: gopng-platform-cluster
      CapacityProviders: [FARGATE, FARGATE_SPOT]
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/gopng-platform
      RetentionInDays: 30

  # Main application task definition
  AppTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: gopng-platform
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: app
          # Placeholder - CI/CD replaces this with the real ECR image on first deploy
          Image: public.ecr.aws/docker/library/node:20-alpine
          Command: ['node', '-e', 'require("http").createServer((_,r)=>{r.end("ok")}).listen(3000)']
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AppLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseURLSecret
            - Name: PAYLOAD_SECRET
              ValueFrom: !Ref PayloadSecretSecret
            - Name: GITHUB_TOKEN
              ValueFrom: !Ref GitHubTokenSecret
          Environment:
            - {Name: NODE_ENV,               Value: production}
            - {Name: PORT,                   Value: '3000'}
            - {Name: HOSTNAME,               Value: '0.0.0.0'}
            - {Name: GITHUB_ORG,             Value: !Ref GitHubOrg}
            - {Name: GITHUB_TEMPLATE_REPO,   Value: !Ref GitHubTemplateRepo}
            - {Name: S3_MEDIA_BUCKET,        Value: !Ref MediaBucket}
            - {Name: S3_STATIC_SITES_BUCKET, Value: !Ref StaticSitesBucket}
            - {Name: AWS_REGION,             Value: !Ref AWS::Region}
            - {Name: AWS_DEPLOY_ROLE_ARN,    Value: !GetAtt SiteDeployRole.Arn}
            - {Name: NEXT_PUBLIC_PAYLOAD_URL, Value: !Ref PayloadURL}
          HealthCheck:
            Command: [CMD-SHELL, 'wget -qO- http://localhost:3000/api/health || exit 1']
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 90

  # One-off migration task definition - run by CI/CD before each deploy
  MigrationTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: gopng-migrate
      Cpu: 512
      Memory: 1024
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: migrate
          Image: public.ecr.aws/docker/library/node:20-alpine
          Command: ['echo', 'placeholder - CI/CD updates this image']
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AppLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: migrate
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseURLSecret
            - Name: PAYLOAD_SECRET
              ValueFrom: !Ref PayloadSecretSecret
          Environment:
            - {Name: NODE_ENV, Value: production}

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: gopng-platform-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref AppTaskDefinition
      DesiredCount: 0  # CI/CD scales to 1 after first real image is pushed
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref ECSSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3000
          TargetGroupArn: !Ref ALBTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      HealthCheckGracePeriodSeconds: 120

  # -- 9. APPLICATION LOAD BALANCER ----------------------------------

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: gopng-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref ALBSecurityGroup

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: gopng-platform-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - {Key: deregistration_delay.timeout_seconds, Value: '30'}

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # -- 10. CLOUDFRONT - STATIC GOVERNMENT SITES ----------------------

  # Origin Access Control - restricts S3 access to CloudFront only
  StaticSitesOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: gopng-static-sites-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Function - rewrites /path/to/dir - /path/to/dir/index.html
  # Required because Next.js static export uses directory-based routing
  IndexRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: gopng-index-rewrite
      AutoPublish: true
      FunctionConfig:
        Comment: Append index.html to directory requests for Next.js static export
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var uri = event.request.uri;
          if (uri.endsWith('/')) {
            event.request.uri += 'index.html';
          } else if (!uri.split('/').pop().includes('.')) {
            event.request.uri += '/index.html';
          }
          return event.request;
        }

  StaticSitesDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: GoPNG static government agency websites
        HttpVersion: http2and3
        Origins:
          - Id: s3-static-sites
            DomainName: !GetAtt StaticSitesBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt StaticSitesOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: s3-static-sites
          ViewerProtocolPolicy: redirect-to-https
          # CachingOptimized managed policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt IndexRewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 10

# ----------------------------------------------------------------------
# OUTPUTS - copy these into GitHub secrets / Actions variables
# ----------------------------------------------------------------------
Outputs:

  ALBDNSName:
    Description: >
      Point your admin domain CNAME here (e.g. cms.digital.gov.pg - this value).
      Add as HTTPS once ACM cert is issued.
    Value: !GetAtt ALB.DNSName

  CloudFrontDomain:
    Description: >
      Point each agency domain CNAME here (e.g. health.gov.pg - this value).
    Value: !GetAtt StaticSitesDistribution.DomainName

  CloudFrontDistributionId:
    Description: >
      Add as CLOUDFRONT_DISTRIBUTION_ID Actions variable on each site repo
      (provisioning hook sets it automatically if AWS_CF_DISTRIBUTION_ID is set).
    Value: !Ref StaticSitesDistribution

  ECRRepositoryURI:
    Description: Push Docker images here. Add to deploy.yml as ECR_REGISTRY/gopng-platform.
    Value: !GetAtt ECRRepository.RepositoryUri

  PlatformDeployRoleARN:
    Description: Add as AWS_DEPLOY_ROLE_ARN secret in TMJ-24/gopng-platform Actions.
    Value: !GetAtt PlatformDeployRole.Arn

  SiteDeployRoleARN:
    Description: >
      Add as AWS_DEPLOY_ROLE_ARN in your platform .env / ECS task environment.
      The provisioning hook passes this to every new site repo as a variable.
    Value: !GetAtt SiteDeployRole.Arn

  PrivateSubnetIds:
    Description: Add as ECS_SUBNET_IDS secret in gopng-platform Actions (comma-separated).
    Value: !Sub ${PrivateSubnetA},${PrivateSubnetB}

  ECSSecurityGroupId:
    Description: Add as ECS_SECURITY_GROUP_ID secret in gopng-platform Actions.
    Value: !Ref ECSSecurityGroup

  MediaBucketName:
    Value: !Ref MediaBucket

  StaticSitesBucketName:
    Value: !Ref StaticSitesBucket

  RDSEndpoint:
    Description: RDS hostname - included in DATABASE_URL secret automatically.
    Value: !GetAtt RDSInstance.Endpoint.Address
